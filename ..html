<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Hypercars</title>
    <style>
      /* Pengaturan Dasar & Dark Mode */
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #121212; /* Warna latar gelap */
        color: #ffffff; /* Teks putih */
      }

      /* Bagian Navigasi (Header) */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
        background-color: rgba(0, 0, 0, 0.8);
        position: fixed;
        width: 100%;
        top: 0;
        box-sizing: border-box;
        z-index: 100;
      }

      .logo {
        font-size: 24px;
        font-weight: bold;
        letter-spacing: 2px;
        color: #e50914; /* Aksen merah agresif */
      }

      nav a {
        color: #ffffff;
        text-decoration: none;
        margin-left: 20px;
        font-size: 14px;
        text-transform: uppercase;
        transition: color 0.3s ease;
      }

      nav a:hover {
        color: #e50914; /* Berubah merah saat disentuh mouse */
      }

      /* Bagian Hero (Tampilan Utama) */
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        /* Kamu bisa mengganti URL di bawah dengan gambar hypercar dari Unsplash */
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
          url("https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=1920&auto=format&fit=crop") no-repeat center center/cover;
      }

      .hero h1 {
        font-size: 60px;
        margin: 0 0 20px 0;
        letter-spacing: 5px;
        text-transform: uppercase;
      }

      .hero p {
        font-size: 20px;
        margin-bottom: 40px;
        color: #cccccc;
        max-width: 600px;
      }

      .btn {
        padding: 15px 40px;
        background-color: #e50914;
        color: white;
        text-decoration: none;
        font-size: 16px;
        font-weight: bold;
        border-radius: 5px;
        text-transform: uppercase;
        transition: background 0.3s ease;
      }

      .btn:hover {
        background-color: #b20710;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">APEX HYPERCARS</div>
      <nav>
        <a href="#">Beranda</a>
        <a href="#">Galeri</a>
        <a href="#">Spesifikasi</a>
        <a href="#">Kontak</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Kecepatan Tanpa Batas</h1>
      <p>Temukan mahakarya teknik otomotif dunia. Rasakan performa, kemewahan, dan desain aerodinamis yang menembus batas kewajaran.</p>
      <a href="#" class="btn">Jelajahi Koleksi</a>
    </section>
  </body>
</html>
